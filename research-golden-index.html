<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>飞象老师校园版 · Deep Research</title>
  <link rel="stylesheet" href="assets/research-golden-index.css?v=index-17">
  <script src="assets/lucide-local.js"></script>
</head>
<body>
<div class="app">
  <aside class="rail" aria-label="校园版主导航">
    <div class="rail-brand"><img src="assets/home/sidebar-toggle.png?v=source-02" alt=""></div>
    <nav class="rail-nav">
      <button class="rail-btn rail-home active" aria-label="首页"><img src="assets/home/sidebar-home-active.png?v=source-02" alt=""></button>
      <button class="rail-btn" aria-label="新对话"><img src="assets/home/sidebar-new-chat.png?v=source-02" alt=""></button>
      <button class="rail-btn" aria-label="历史记录"><img src="assets/home/sidebar-history.png?v=source-02" alt=""></button>
      <button class="rail-btn" aria-label="云空间"><img src="assets/home/sidebar-cloud.png?v=source-02" alt=""></button>
      <button class="rail-btn" aria-label="我的作品"><img src="assets/home/sidebar-workspace.png?v=source-02" alt=""></button>
      <button class="rail-btn" aria-label="知识库"><img src="assets/home/sidebar-library.png?v=source-02" alt=""></button>
      <button class="rail-btn" aria-label="应用广场"><img src="assets/home/sidebar-app-market.png?v=source-02" alt=""></button>
      <button class="rail-btn" aria-label="资源广场"><img src="assets/home/sidebar-globe.png?v=source-02" alt=""></button>
    </nav>
    <div class="rail-user"><img src="assets/home/avatar.jpg" alt="邓老师"></div>
  </aside>

  <main class="main">
    <div class="greeting"><img class="assistant-avatar" src="assets/home/chat-logo.png" alt=""><h1>邓老师，今天想做什么？</h1></div>

    <form class="composer" id="queryForm">
      <div class="attachment-list" id="attachmentList" aria-live="polite"></div>
      <textarea id="queryInput" rows="2" autofocus placeholder="请输入想要分析的学情问题"></textarea>
      <div class="composer-footer">
        <div class="composer-tools">
          <div class="attachment-control">
            <button class="icon-button add-attachment" id="attachmentTrigger" type="button" aria-label="添加文件或图片" aria-haspopup="menu" aria-expanded="false"><i data-lucide="plus"></i></button>
            <div class="attachment-menu" id="attachmentMenu" role="menu" aria-label="添加附件" hidden>
              <button type="button" role="menuitem" data-picker="file"><i data-lucide="paperclip"></i><span>添加文件</span></button>
              <button type="button" role="menuitem" data-picker="image"><i data-lucide="image"></i><span>添加图片</span></button>
            </div>
          </div>
          <div class="selected-feature" aria-label="当前功能：学情分析">
            <i data-lucide="chart-no-axes-combined"></i>
            <span>学情分析</span>
          </div>
        </div>
        <div class="composer-actions">
          <button class="icon-button mic" type="button" aria-label="语音输入"><i data-lucide="mic"></i></button>
          <button class="icon-button send" id="sendQuery" type="submit" disabled aria-label="发送"><i data-lucide="arrow-up"></i></button>
        </div>
      </div>
      <input class="visually-hidden" id="filePicker" type="file" multiple>
      <input class="visually-hidden" id="imagePicker" type="file" accept="image/*" multiple>
    </form>

    <div class="query-suggestions" aria-label="问题建议">
      <span class="suggestion-label">试试问我</span>
      <button class="query-suggestion" type="button" data-query="林知遥本学期整体学习情况如何？">
        <span>林知遥本学期整体学习情况如何？</span>
      </button>
      <button class="query-suggestion" type="button" data-query="帮我分析这个学校的作文数据">
        <span>帮我分析这个学校的作文数据</span>
      </button>
      <button class="query-suggestion" type="button" data-query="帮我分析这个学校七年级本学期的作文数据">
        <span>帮我分析这个学校七年级本学期的作文数据</span>
      </button>
      <button class="query-suggestion" type="button" data-query="九年级2班本学期的作文数据反映出哪些问题？">
        <span>九年级2班本学期的作文数据反映出哪些问题？</span>
      </button>
    </div>

    <section class="section">
      <div class="section-head"><h2>常用应用</h2><button class="section-link" type="button"><i data-lucide="pencil"></i>编辑</button></div>
      <div class="apps">
        <button class="app-card" type="button"><img src="assets/home/ai-school-qbank.png" alt=""><strong>AI校本题库</strong></button>
        <button class="app-card" type="button"><img src="assets/home/ai-question-input.png" alt=""><strong>AI录题</strong></button>
      </div>
    </section>

    <section class="section">
      <div class="section-head"><h2>为您推荐</h2><button class="section-link" type="button">全部<i data-lucide="chevron-right"></i></button></div>
      <div class="recommend">
        <article class="recommend-card">
          <div class="recommend-cover"><img src="assets/home/recommend-english.jpg?v=source-01" alt="Unit4 Healthy Food 第一课时"><span class="badge"><i data-lucide="flame"></i>热门</span><span class="views"><i data-lucide="eye"></i>10.1万</span></div>
          <div class="recommend-info"><h3>Unit4 Healthy Food 第一课时</h3><div><span class="author"><img src="assets/home/avatar-haidian.jpg?v=source-01" alt="">海淀老师勇闯AI圈</span><span><i data-lucide="star"></i>6278</span></div></div>
        </article>
        <article class="recommend-card">
          <div class="recommend-cover"><img src="assets/home/recommend-writing.jpg?v=source-01" alt="写作思维小助手 新版本"><span class="views"><i data-lucide="eye"></i>6.1万</span></div>
          <div class="recommend-info"><h3>写作思维小助手 新版本</h3><div><span class="author"><img src="assets/home/avatar-writing.jpg?v=source-01" alt="">福州鼓一小谢娟</span><span><i data-lucide="star"></i>6130</span></div></div>
        </article>
        <article class="recommend-card">
          <div class="recommend-cover"><img src="assets/home/recommend-cylinder.jpg?v=source-01" alt="【互动课件】小学数学六年级圆柱的体积"><span class="badge"><i data-lucide="flame"></i>热门</span><span class="views"><i data-lucide="eye"></i>11.4万</span></div>
          <div class="recommend-info"><h3>【互动课件】小学数学六年级圆柱的体积</h3><div><span class="author"><img src="assets/home/avatar-leaf.jpg?v=source-01" alt="">小叶老师用AI</span><span><i data-lucide="star"></i>5867</span></div></div>
        </article>
      </div>
    </section>
  </main>
</div>

<script>
  (() => {
    const input = document.getElementById('queryInput');
    const form = document.getElementById('queryForm');
    const send = document.getElementById('sendQuery');
    const suggestions = document.querySelectorAll('.query-suggestion');
    const attachmentTrigger = document.getElementById('attachmentTrigger');
    const attachmentMenu = document.getElementById('attachmentMenu');
    const attachmentList = document.getElementById('attachmentList');
    const filePicker = document.getElementById('filePicker');
    const imagePicker = document.getElementById('imagePicker');
    const attachmentLimit = 10;
    let attachments = [];
    const requestedVersion = new URLSearchParams(location.search).get('version');
    const version = ['v1', 'v2', 'v3', 'v4'].includes(requestedVersion) ? requestedVersion : 'v2';
    const sync = () => { send.disabled = !input.value.trim(); };
    const formatSize = bytes => {
      if (bytes < 1024) return `${bytes}B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(bytes < 10240 ? 2 : 1)}KB`;
      return `${(bytes / (1024 * 1024)).toFixed(2)}MB`;
    };
    const extensionOf = name => {
      const suffix = name.includes('.') ? name.split('.').pop() : '文件';
      return suffix.slice(0, 4).toUpperCase();
    };
    const iconOf = (name, kind) => {
      if (kind === 'image') return 'file-image';
      const extension = extensionOf(name).toLowerCase();
      if (['xls', 'xlsx', 'csv'].includes(extension)) return 'file-spreadsheet';
      if (['html', 'htm', 'js', 'json', 'py'].includes(extension)) return 'file-code';
      if (['doc', 'docx', 'pdf', 'txt', 'md'].includes(extension)) return 'file-text';
      return 'file';
    };
    const closeAttachmentMenu = () => {
      attachmentMenu.hidden = true;
      attachmentTrigger.setAttribute('aria-expanded', 'false');
    };
    const renderAttachments = () => {
      attachmentList.replaceChildren();
      attachmentList.hidden = attachments.length === 0;
      form.classList.toggle('has-attachments', attachments.length > 0);
      attachments.forEach(item => {
        const card = document.createElement('div');
        card.className = 'attachment-card';
        card.dataset.attachmentId = item.id;

        const icon = document.createElement('span');
        icon.className = `attachment-file-icon ${item.kind === 'image' ? 'is-image' : ''}`;
        icon.innerHTML = `<i data-lucide="${iconOf(item.file.name, item.kind)}"></i>`;

        const meta = document.createElement('span');
        meta.className = 'attachment-meta';
        const name = document.createElement('span');
        name.className = 'attachment-name';
        name.textContent = item.file.name;
        const status = document.createElement('span');
        status.className = 'attachment-status';
        status.textContent = item.status === 'uploading' ? `上传中 ${item.progress}%` : formatSize(item.file.size);
        meta.append(name, status);

        const remove = document.createElement('button');
        remove.className = 'attachment-remove';
        remove.type = 'button';
        remove.setAttribute('aria-label', `移除 ${item.file.name}`);
        remove.innerHTML = '<i data-lucide="x"></i>';
        remove.addEventListener('click', () => {
          attachments = attachments.filter(attachment => attachment.id !== item.id);
          renderAttachments();
        });

        card.append(icon, meta, remove);
        attachmentList.appendChild(card);
      });
      window.lucide && window.lucide.createIcons({ nodes: [attachmentList] });
    };
    const finishUpload = id => {
      const item = attachments.find(attachment => attachment.id === id);
      if (!item) return;
      if (item.progress < 100) {
        item.progress = Math.min(100, item.progress + 25);
        renderAttachments();
        window.setTimeout(() => finishUpload(id), 90);
        return;
      }
      item.status = 'done';
      renderAttachments();
    };
    const addFiles = (files, kind) => {
      const available = Math.max(0, attachmentLimit - attachments.length);
      Array.from(files).slice(0, available).forEach((file, index) => {
        const id = `${Date.now()}-${index}-${Math.random().toString(16).slice(2)}`;
        attachments.push({ id, file, kind, status: 'uploading', progress: 0 });
        window.setTimeout(() => finishUpload(id), 80 + index * 50);
      });
      renderAttachments();
      filePicker.value = '';
      imagePicker.value = '';
    };
    attachmentTrigger.addEventListener('click', event => {
      event.stopPropagation();
      const willOpen = attachmentMenu.hidden;
      attachmentMenu.hidden = !willOpen;
      attachmentTrigger.setAttribute('aria-expanded', String(willOpen));
      if (willOpen) attachmentMenu.querySelector('button')?.focus();
    });
    attachmentMenu.addEventListener('click', event => {
      const option = event.target.closest('[data-picker]');
      if (!option) return;
      closeAttachmentMenu();
      (option.dataset.picker === 'image' ? imagePicker : filePicker).click();
    });
    filePicker.addEventListener('change', () => addFiles(filePicker.files, 'file'));
    imagePicker.addEventListener('change', () => addFiles(imagePicker.files, 'image'));
    document.addEventListener('click', event => {
      if (!event.target.closest('.attachment-control')) closeAttachmentMenu();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeAttachmentMenu();
        attachmentTrigger.focus();
      }
    });
    input.addEventListener('input', sync);
    input.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); form.requestSubmit(); }
    });
    suggestions.forEach(suggestion => {
      suggestion.addEventListener('click', () => {
        input.value = suggestion.dataset.query || '';
        sync();
        input.focus();
        input.setSelectionRange(input.value.length, input.value.length);
      });
    });
    form.addEventListener('submit', event => {
      event.preventDefault();
      const query = input.value.trim();
      if (!query) return;
      if (query === '帮我分析这个学校的作文数据') {
        const params = new URLSearchParams({ q: query, school: 'shanghai-keller' });
        location.href = `research-writing-school.html?${params.toString()}`;
        return;
      }
      if (/七年级/.test(query) && /作文/.test(query)) {
        const params = new URLSearchParams({ q: query, school: 'shanghai-keller', grade: '7' });
        location.href = `research-writing-grade.html?${params.toString()}`;
        return;
      }
      if (/九年级\s*2班|九年级2班/.test(query) && /作文/.test(query)) {
        const params = new URLSearchParams({ q: query, school: 'shanghai-keller', grade: '9', class: '2' });
        location.href = `research-writing-class.html?${params.toString()}`;
        return;
      }
      const targets = { v1: 'research-golden.html', v2: 'research-golden-v2.html', v3: 'research-golden-v3.html', v4: 'research-golden-v4.html' };
      const target = targets[version];
      const params = new URLSearchParams({case:'overall', g:'11', golden:'16', q:query});
      if (version === 'v2') params.set('v2', '1');
      if (version === 'v3') params.set('v3', '1');
      if (version === 'v4') {
        params.set('v4', '1');
        params.set('build', 'golden-v4-25');
      }
      location.href = `${target}?${params.toString()}`;
    });
    sync();
    window.lucide && window.lucide.createIcons();
  })();
</script>
</body>
</html>
