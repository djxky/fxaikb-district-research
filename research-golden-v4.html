<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="飞象教育 · 学情深度研究 v4">
  <title>飞象教育 · 整体学习情况 v4</title>
  <link rel="stylesheet" href="assets/research-live.css?v=stream-14">
  <link rel="stylesheet" href="assets/research-golden.css?v=golden-10">
  <link rel="stylesheet" href="assets/research-golden-v4.css?v=golden-v4-05">
  <script src="assets/lucide-local.js"></script>
  <script src="assets/research-golden-v4.js?v=golden-v4-05" defer></script>
</head>
<body class="v4-page">
  <header class="v4-topbar">
    <div class="v4-topbar-inner">
      <a class="v4-back" href="research-golden-index.html?version=v4" aria-label="返回研究入口"><i data-lucide="chevron-left"></i></a>
      <div class="v4-title"><strong>林知遥 · 整体学习情况</strong><small>飞象AI校园版 · 学情深度研究</small></div>
      <div class="v4-trust" aria-label="研究边界">
        <span><i data-lucide="database"></i>授权数据</span>
        <span><i data-lucide="route"></i>过程可追溯</span>
        <span><i data-lucide="shield-check"></i>结论有边界</span>
      </div>
    </div>
  </header>

  <main class="v4-shell">
    <section class="v4-user-turn" aria-label="用户问题">
      <div class="v4-user-bubble" id="queryText"></div>
    </section>

    <div class="v4-runbar" id="runToolbar">
      <span class="v4-status-dot"></span>
      <div class="v4-run-copy">
        <span>学情研究进度</span>
        <strong id="runStatus">正在准备研究</strong>
      </div>
      <span class="v4-elapsed" id="runElapsed">00:00</span>
      <div class="v4-run-actions">
        <button id="stopResearch" type="button" hidden><i data-lucide="square"></i>停止</button>
        <button id="continueResearch" type="button" hidden><i data-lucide="play"></i>继续</button>
        <button id="restartResearch" type="button" hidden><i data-lucide="rotate-ccw"></i>重新研究</button>
      </div>
    </div>

    <section class="v4-stream" id="agentStream" aria-live="polite" aria-label="AI学情研究过程"></section>

    <section class="v4-finish" id="finishMessage" hidden>
      <img class="v4-avatar" src="assets/home/chat-logo.png" alt="飞象老师">
      <div class="v4-finish-body">
        <div class="v4-kicker"><i data-lucide="file-check-2"></i>研究完成</div>
        <h2>学期性研判已收拢为教学支持报告</h2>
        <p>报告保留可以确认的变化、限制性证据、停止判断项目、两周支持方案和12条代表记录。</p>
        <div class="v4-finish-actions">
          <button class="v4-primary" id="openReport" type="button"><i data-lucide="file-text"></i>查看完整报告</button>
          <button class="v4-secondary" id="openEvidenceFromFinish" type="button"><i data-lucide="link-2"></i>查看证据链</button>
        </div>
      </div>
    </section>

    <div class="v4-error" id="errorMessage" hidden></div>

    <section class="v4-composer" aria-label="继续追问">
      <textarea id="followupInput" rows="1" placeholder="研究完成后，可以继续追问或补充关注方向" disabled></textarea>
      <button id="sendFollowup" type="button" disabled aria-label="发送追问"><i data-lucide="arrow-up"></i></button>
    </section>
  </main>

  <dialog class="v4-evidence-dialog" id="evidenceDialog" aria-labelledby="evidenceDialogTitle">
    <div class="v4-evidence-head">
      <div><span>判断依据</span><h2 id="evidenceDialogTitle">一次函数变化信号的证据链</h2></div>
      <button id="closeEvidence" type="button" aria-label="关闭证据链"><i data-lucide="x"></i></button>
    </div>
    <div class="v4-evidence-content" id="evidenceContent"></div>
  </dialog>

  <dialog id="reportDialog" class="report-dialog" aria-labelledby="reportTitle">
    <div class="dialog-head">
      <div class="report-window-title"><span class="report-window-icon">飞</span><div><strong>文件预览</strong><small>整体学习情况分析报告</small></div></div>
      <div class="report-window-actions"><button class="report-action" id="downloadReport" type="button">下载</button><button class="close" id="closeReport" type="button" aria-label="关闭报告">×</button></div>
    </div>
    <div class="report-layout"><main class="report-page" id="reportPage"><div id="reportDocument"></div><div id="reportAppendixMount"></div></main></div>
  </dialog>
</body>
</html>
