<body class="v4-page school-writing-v4" data-analysis-scope="grade">
  <header class="v4-topbar"><div class="v4-topbar-inner">
    <a class="v4-back" href="research-golden-index.html?version=v4" aria-label="返回研究入口"><i data-lucide="chevron-left"></i></a>
    <div class="v4-title"><strong>上海民办克勒外国语学校 · 七年级作文学情分析</strong><small>飞象AI校园版 · 学情深度研究</small></div>

  </div></header>
  <main class="v4-shell">
    <section class="v4-user-turn"><div class="v4-user-bubble" id="queryText"></div></section>
    <div class="v4-runbar" id="runToolbar"><span class="v4-status-dot"></span><div class="v4-run-copy"><span>学情研究进度</span><strong id="runStatus">正在准备研究</strong></div><span class="v4-elapsed" id="runElapsed">00:00</span><div class="v4-run-actions"><button id="stopResearch" type="button" hidden><i data-lucide="square"></i>停止</button><button id="continueResearch" type="button" hidden><i data-lucide="play"></i>继续</button><button id="restartResearch" type="button" hidden><i data-lucide="rotate-ccw"></i>重新研究</button></div></div>
    <section class="v4-stream" id="agentStream" aria-live="polite"></section>
    <section class="v4-finish" id="finishMessage" hidden><img class="v4-avatar" src="assets/home/chat-logo.png" alt="飞象老师"><div class="v4-finish-body"><div class="v4-kicker"><i data-lucide="file-check-2"></i>年级诊断完成</div><h2>七年级作文学情诊断已完成</h2><p>报告确认审题精准度与篇章结构是七年级优先改进方向，并已形成面向备课组、任课教师和学生的分层训练安排。</p><div class="v4-finish-actions"><button class="v4-primary" id="openReport" type="button"><i data-lucide="file-text"></i>查看完整报告</button></div></div></section>
    <div class="v4-error" id="errorMessage" hidden></div>
    <section class="v4-composer"><textarea id="followupInput" rows="1" placeholder="研究完成后，可以继续追问或补充关注方向" disabled></textarea><button id="sendFollowup" type="button" disabled aria-label="发送追问"><i data-lucide="arrow-up"></i></button></section>
  </main>
  <dialog id="reportDialog" class="report-dialog" aria-labelledby="reportTitle"><div class="dialog-head"><div class="report-window-title"><span class="report-window-icon">飞</span><div><strong id="reportTitle">文件预览</strong><small>七年级作文综合学情分析报告</small></div></div><div class="report-window-actions"><button class="report-action" id="downloadReport" type="button">下载</button><button class="close" id="closeReport" type="button" aria-label="关闭报告">×</button></div></div><div class="report-layout"><main class="report-page"><div id="reportDocument"></div></main></div></dialog>
