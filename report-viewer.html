<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学习情况分析报告</title>
  <style>
    :root{--ink:#17202a;--muted:#65727e;--line:#dde4e3;--blue:#0f6d98;--blue-soft:#edf7fb;--green:#237153;--green-soft:#edf7f1;--gold-soft:#fbf5e8;--bg:#f5f6f4;--surface:#fff;--shadow:0 16px 50px rgba(22,36,46,.08)}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.7 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}a{color:var(--blue)}
    .page{width:min(1080px,calc(100% - 32px));margin:28px auto 60px}.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:22px}.eyebrow{color:var(--green);font-size:11px;font-weight:800;letter-spacing:.08em}.top h1{margin:4px 0;font-size:30px;line-height:1.25}.top p{margin:0;color:var(--muted)}.back{white-space:nowrap;padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;text-decoration:none;font-size:12px}
    .card{margin:14px 0;padding:22px;border:1px solid var(--line);border-radius:14px;background:var(--surface);box-shadow:var(--shadow)}.card h2{margin:0 0 12px;font-size:20px}.section{margin:20px 0}.section h3{margin:0 0 8px;font-size:18px}.section p{margin:8px 0;white-space:pre-line}.summary{padding:18px;border-left:4px solid var(--green);border-radius:0 10px 10px 0;background:var(--green-soft)}.summary p{margin:0 0 8px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{padding:14px;border-radius:10px;background:var(--blue-soft)}.metric small{display:block;color:var(--muted);font-size:11px}.metric strong{display:block;margin-top:3px;color:var(--blue);font-size:24px;line-height:1.2}.metric span{color:var(--muted);font-size:11px}.chart-wrap{overflow:auto}.chart{display:grid;gap:8px;min-width:620px}.bar-row{display:grid;grid-template-columns:150px 1fr 48px;align-items:center;gap:10px;font-size:12px}.bar{height:12px;overflow:hidden;border-radius:10px;background:#edf0ef}.bar i{display:block;height:100%;border-radius:10px;background:var(--blue)}.bar-row:nth-child(even) .bar i{background:var(--green)}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:12px}.table th,.table td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}.table th{color:var(--muted);background:#fafbfb}.source-list{margin:0;padding-left:20px;color:var(--muted);font-size:12px}.notice{margin-top:14px;padding:12px 14px;border-radius:9px;background:var(--gold-soft);color:#725d35;font-size:12px}.error{padding:20px;color:#a54a43;background:#fbefed;border-radius:10px}.foot{color:var(--muted);font-size:11px;text-align:center;margin-top:20px}@media(max-width:720px){.top{display:block}.back{display:inline-block;margin-top:12px}.metrics{grid-template-columns:repeat(2,1fr)}.card{padding:16px}.top h1{font-size:25px}}
  </style>
</head>
<body>
  <main class="page" id="app"><div class="card">正在读取完整研究报告…</div></main>
  <script>
    const artifactPath='reports/lin-zhiyao/artifact.json';
    const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const md=body=>{let html=esc(body).replace(/^### (.+)$/gm,'<h4>$1</h4>').replace(/^## (.+)$/gm,'<h3>$1</h3>').replace(/^# (.+)$/gm,'<h2>$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>');html=html.replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`).replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');return `<div class="section"><p>${html}</p></div>`};
    function metrics(m,s){return (m.blocks.find(x=>x.type==='metric-strip')?.cardIds||[]).map(id=>{const card=m.cards.find(x=>x.id===id),data=s.datasets[card?.dataset]?.[0]||{},metric=card?.metrics?.[0];return metric?`<div class="metric"><small>${esc(metric.label)}</small><strong>${esc(data[metric.field])}</strong><span>${esc(card.description)}</span></div>`:''}).join('')}
    function chart(block,m,s){const c=m.charts.find(x=>x.id===block.chartId),rows=s.datasets[c?.dataset]||[];if(!c||!rows.length)return '';const x=c.encodings.x.field,y=c.encodings.y.field,max=Math.max(...rows.map(r=>Number(r[y])||0),1);return `<section class="section chart-wrap"><h3>${esc(c.title)}</h3><p>${esc(c.description||'')}</p><div class="chart">${rows.slice(0,24).map(r=>`<div class="bar-row"><span>${esc(r[x])}${r.task_type?` · ${esc(r.task_type)}`:''}</span><span class="bar"><i style="width:${Math.max(3,Number(r[y])/max*100)}%"></i></span><b>${esc(typeof r[y]==='number'&&r[y]<1?(r[y]*100).toFixed(0)+'%':r[y])}</b></div>`).join('')}</div></section>`}
    function table(block,m,s){const t=m.tables.find(x=>x.id===block.tableId),rows=s.datasets[t?.dataset]||[];if(!t)return '';return `<section class="section table-wrap"><h3>${esc(t.title)}</h3><p>${esc(t.description||'')}</p><table class="table"><thead><tr>${t.columns.map(c=>`<th>${esc(c.label||c.field)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${t.columns.map(c=>`<td>${esc(r[c.field])}</td>`).join('')}</tr>`).join('')}</tbody></table></section>`}
    async function render(){try{const data=await fetch(artifactPath).then(r=>{if(!r.ok)throw Error('报告文件未找到');return r.json()}),m=data.manifest,s=data.snapshot;let body='';for(const b of m.blocks||[]){if(b.type==='markdown')body+=md(b.body);if(b.type==='metric-strip')body+=`<div class="metrics">${metrics(m,s)}</div>`;if(b.type==='chart')body+=`<div class="card">${chart(b,m,s)}</div>`;if(b.type==='table')body+=`<div class="card">${table(b,m,s)}</div>`}const sources=(m.sources||[]).map(x=>`<li>${esc(x.label)}${x.href?` · <a href="${esc(x.href)}" target="_blank" rel="noreferrer">查看来源</a>`:''}</li>`).join('');document.title=m.title;document.getElementById('app').innerHTML=`<header class="top"><div><div class="eyebrow">飞象教育分析引擎 · 可审计研究报告</div><h1>${esc(m.title)}</h1><p>${esc(m.description)} · 生成时间 ${esc(m.generatedAt)}</p></div><a class="back" href="district-deep-research.html">返回研究过程</a></header>${body}<section class="card"><h2>数据来源与使用边界</h2><ul class="source-list">${sources}</ul><div class="notice">本报告使用脱敏模拟数据，仅用于演示教育分析能力，不代表真实学生结论；不用于能力定级、公开排名或升学决策。</div></section><div class="foot">报告数据：artifact.json · 模拟数据：learning-data.json</div>`}catch(e){document.getElementById('app').innerHTML=`<div class="card error">无法加载完整报告：${esc(e.message)}<br>请确认报告 JSON 已部署到 reports/lin-zhiyao/。</div>`}}render();
  </script>
</body>
</html>
